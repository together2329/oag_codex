schema_version: oag_rule_index.v1
purpose: Stable rule IDs mapped to policy docs and executable checks.
rules:
  - id: RULE-OAG-INV-001
    text: RTL is implementation, not design truth.
    policy_refs:
      - oag/principles.md
      - oag/rtl-implementation.md
    checker_refs:
      - scripts/oag_lock_readiness_check.py
      - scripts/oag_closure_check.py
    tested_by:
      - smoke_test.py::test_decision_rtl_consistency_check
    severity:
      draft: warn
      post_lock: block
      closure: block
  - id: RULE-LOCK-003
    text: lock_required decisions must be decided or waived before implementation.
    policy_refs:
      - oag/decision-matrix-policy.md
      - oag/decision-autonomy-policy.md
    checker_refs:
      - scripts/oag_lock_readiness_check.py
      - scripts/oag_decision_matrix_generate.py
    tested_by:
      - smoke_test.py::test_oag_decision_autonomy_policy
    severity:
      draft: warn
      post_lock: block
      closure: block
  - id: RULE-AUTO-001
    text: Product-defining decisions are human-only; missing or unknown decision_class fails closed as product_defining.
    policy_refs:
      - oag/decision-autonomy-policy.md
      - rules/oag-decision-autonomy.rules.md
    checker_refs:
      - scripts/oag_decision_autoresolve.py
