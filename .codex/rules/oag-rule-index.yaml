      post_lock: block
      closure: block
  - id: RULE-AUTO-003
    text: Architecture tradeoff autonomy requires an approved charter grant and routes to bounded DSE rather than deciding product scope.
    policy_refs:
      - oag/decision-autonomy-policy.md
      - rules/oag-decision-autonomy.rules.md
    checker_refs:
      - scripts/oag_decision_autoresolve.py
