schema_version: oag_wavefront_template.v1
name: mctp_rx_v1_closure_refresh
description: MCTP RX v1.0 closure refresh after UVM overlong/padding evidence update; canonical evidence refresh, ROCEV validation supersede, and gate review are serialized integration-owner tasks.
tasks:
  - task_id: EVIDENCE_CANONICAL_REFRESH
    kind: integration
    phase: sim
    agent_type: oag-sim-execution-agent
    depends_on: []
    barrier_outputs:
      - evidence_canonical_refresh_ready
    shared_artifacts:
      - rtl/rtl_compile.json
      - lint/dut_lint.json
      - lint/reports/
      - sim/results.xml
      - sim/scoreboard_events.jsonl
      - sim/scenario_mapping.json
      - sim/uvm_status.json
      - sim/uvm_results.xml
      - sim/uvm_scoreboard_events.jsonl
      - sim/uvm_scenario_mapping.json
      - sim/uvm_verilator_build.log
      - sim/uvm_run.log
      - sim/runs/
      - cov/coverage.json
      - cov/verilator.coverage.json
      - cov/iverilog.coverage.json
      - ontology/generated/
    ownership_mode: integration_owner
    may_claim_complete: false
  - task_id: EVIDENCE_VALIDATION_REFRESH
    kind: integration
    phase: closure
    agent_type: oag-evidence-validator
    depends_on:
      - EVIDENCE_CANONICAL_REFRESH
    barrier_inputs:
      - evidence_canonical_refresh_ready
    barrier_outputs:
      - evidence_validation_refresh_ready
    shared_artifacts:
      - knowledge/records/
      - knowledge/_index.json
      - knowledge/ledger.jsonl
      - knowledge/validations/oag_validation_report.json
      - knowledge/subagents/
    ownership_mode: integration_owner
    may_claim_complete: false
  - task_id: GATE_REVIEW_REFRESH
    kind: integration
    phase: gate
    agent_type: oag-gate-reviewer
    depends_on:
      - EVIDENCE_VALIDATION_REFRESH
    barrier_inputs:
      - evidence_validation_refresh_ready
    barrier_outputs:
      - gate_review_refresh_ready
    shared_artifacts:
      - knowledge/gate_reviews/oag_gate_decision.json
      - knowledge/subagents/
    ownership_mode: integration_owner
    may_claim_complete: false
