schema_version: oag_wavefront_template.v1
name: mctp_rx_v1_uvm_oag_projection
description: Diagnose failed legacy canonical scoreboard, then project passing UVM evidence into OAG contract-vocabulary canonical artifacts for closure validation.
tasks:
  - task_id: DEBUG_LEGACY_SCOREBOARD_FAILURE
    kind: read_only
    phase: sim_debug
    agent_type: oag-sim-debug-agent
    depends_on: []
    barrier_outputs:
      - legacy_scoreboard_failure_classified
    allowed_write_paths: []
    ownership_mode: none
    may_claim_complete: false
  - task_id: UVM_OAG_SCOREBOARD_PROJECTION
    kind: integration
    phase: sim
    agent_type: oag-sim-execution-agent
    depends_on:
      - DEBUG_LEGACY_SCOREBOARD_FAILURE
    barrier_inputs:
      - legacy_scoreboard_failure_classified
    barrier_outputs:
      - uvm_oag_scoreboard_projection_ready
    shared_artifacts:
      - sim/results.xml
      - sim/scoreboard_events.jsonl
      - sim/scenario_mapping.json
      - cov/coverage.json
      - cov/verilator.coverage.json
      - sim/runs/
    ownership_mode: integration_owner
    may_claim_complete: false
