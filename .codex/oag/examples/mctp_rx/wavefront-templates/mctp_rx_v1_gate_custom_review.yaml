schema_version: oag_wavefront_template.v1
name: mctp_rx_v1_gate_custom_review
description: Custom reviewer fallback for final development-closure gate when the dedicated gate-reviewer role is unavailable or stuck.
tasks:
  - task_id: GATE_REVIEW_CUSTOM_POST_PROJECTION
    kind: integration
    phase: gate
    agent_type: oag-custom-reviewer
    depends_on: []
    barrier_inputs:
      - evidence_validation_post_projection_ready
    barrier_outputs:
      - gate_review_custom_post_projection_ready
    shared_artifacts:
      - knowledge/gate_reviews/oag_gate_decision.json
      - knowledge/subagents/
    ownership_mode: integration_owner
    may_claim_complete: false
