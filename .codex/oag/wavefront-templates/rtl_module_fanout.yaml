schema_version: oag_wavefront_template.v1
name: rtl_module_fanout
description: Role-structured RTL wavefront; replace paths with generated authoring packet module shards while preserving exclusive ownership.
tasks:
  - task_id: RTL_PACKET_CONTEXT
    kind: read_only
    phase: rtl_context
    agent_type: oag-rtl-implementation-agent
    depends_on: []
    barrier_outputs:
      - rtl_authoring_packet_ready
      - rtl_role_split_ready
    allowed_write_paths: []
    ownership_mode: none
    may_claim_complete: false
  - task_id: RTL_INTERFACE_SHELL
    kind: write
    phase: rtl_interface
    agent_type: oag-rtl-implementation-agent
    depends_on:
      - RTL_PACKET_CONTEXT
    barrier_inputs:
      - rtl_authoring_packet_ready
      - rtl_role_split_ready
    barrier_outputs:
      - rtl_interface_shell_ready
    allowed_write_paths:
      - rtl/interface_shell.sv
      - rtl/register_shell.sv
    ownership_mode: exclusive_file
    may_claim_complete: false
  - task_id: RTL_CONTROL_FSM
    kind: write
    phase: rtl_control
    agent_type: oag-rtl-implementation-agent
    depends_on:
      - RTL_PACKET_CONTEXT
    barrier_inputs:
      - rtl_authoring_packet_ready
      - rtl_role_split_ready
    barrier_outputs:
      - rtl_control_fsm_ready
    allowed_write_paths:
      - rtl/control_fsm.sv
    ownership_mode: exclusive_file
    may_claim_complete: false
  - task_id: RTL_DATAPATH_STATE
    kind: write
    phase: rtl_datapath
    agent_type: oag-rtl-implementation-agent
    depends_on:
      - RTL_PACKET_CONTEXT
    barrier_inputs:
      - rtl_authoring_packet_ready
      - rtl_role_split_ready
    barrier_outputs:
      - rtl_datapath_state_ready
    allowed_write_paths:
      - rtl/datapath_state.sv
    ownership_mode: exclusive_file
    may_claim_complete: false
  - task_id: RTL_CLOCK_RESET_DOMAIN
    kind: write
    phase: rtl_clock_reset
    agent_type: oag-rtl-implementation-agent
    depends_on:
      - RTL_PACKET_CONTEXT
    barrier_inputs:
      - rtl_authoring_packet_ready
      - rtl_role_split_ready
    barrier_outputs:
      - rtl_clock_reset_domain_ready
    allowed_write_paths:
      - rtl/clock_reset_domain.sv
    ownership_mode: exclusive_file
    may_claim_complete: false
  - task_id: RTL_INTEGRATION_OWNER
    kind: integration
    phase: rtl_integration
    agent_type: oag-rtl-lint-static-agent
    depends_on:
      - RTL_INTERFACE_SHELL
      - RTL_CONTROL_FSM
      - RTL_DATAPATH_STATE
      - RTL_CLOCK_RESET_DOMAIN
    barrier_inputs:
      - rtl_interface_shell_ready
      - rtl_control_fsm_ready
      - rtl_datapath_state_ready
      - rtl_clock_reset_domain_ready
    barrier_outputs:
      - rtl_integrated_static_ready
    shared_artifacts:
      - rtl/ip_top.sv
      - list/rtl.f
      - list/lint.f
      - lint/dut_lint.json
      - knowledge/implementation/rtl_role_manifest.json
    ownership_mode: integration_owner
    may_claim_complete: false
