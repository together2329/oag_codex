schema_version: oag_wavefront_template.v1
name: mctp_rx_v1_uvm_locked_event_gap_repair
description: Add UVM DUT-observed evidence for locked events that are missing from the UVM-to-OAG canonical projection, rerun random regression, and regenerate canonical closure artifacts.
tasks:
  - task_id: TB_UVM_LOCKED_EVENT_GAPS
    kind: write
    phase: tb
    agent_type: oag-tb-implementation-agent
    depends_on: []
    barrier_outputs:
      - tb_uvm_locked_event_gaps_ready
    allowed_write_paths:
      - tb/uvm/mctp_rx_uvm_pkg.sv
      - tb/uvm/mctp_rx_uvm_top.sv
    ownership_mode: exclusive_file
    may_claim_complete: false
  - task_id: SIM_UVM_LOCKED_EVENT_REGRESSION
    kind: integration
    phase: sim
    agent_type: oag-sim-execution-agent
    depends_on:
      - TB_UVM_LOCKED_EVENT_GAPS
    barrier_inputs:
      - tb_uvm_locked_event_gaps_ready
    barrier_outputs:
      - sim_uvm_locked_event_regression_ready
    shared_artifacts:
      - sim/uvm_status.json
      - sim/uvm_results.xml
      - sim/uvm_scoreboard_events.jsonl
      - sim/uvm_scenario_mapping.json
      - sim/uvm_verilator_build.log
      - sim/uvm_run.log
      - sim/uvm_obj_dir/
      - sim/runs/
      - cov/coverage.json
      - cov/verilator.coverage.json
    ownership_mode: integration_owner
    may_claim_complete: false
  - task_id: UVM_OAG_SCOREBOARD_PROJECTION_LOCKED_EVENTS
    kind: integration
    phase: sim
    agent_type: oag-sim-execution-agent
    depends_on:
      - SIM_UVM_LOCKED_EVENT_REGRESSION
    barrier_inputs:
      - sim_uvm_locked_event_regression_ready
    barrier_outputs:
      - uvm_oag_scoreboard_projection_locked_events_ready
    shared_artifacts:
      - sim/results.xml
      - sim/scoreboard_events.jsonl
      - sim/scenario_mapping.json
      - cov/coverage.json
      - cov/verilator.coverage.json
      - sim/runs/
    ownership_mode: integration_owner
    may_claim_complete: false
