model = "gpt-5.5"
model_context_window = 400000
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
[features]
multi_agent = true
child_agents_md = true
hooks = true

[features.multi_agent_v2]
enabled = false
max_concurrent_threads_per_session = 1000

[agents]
max_depth = 1
max_threads = 1000
